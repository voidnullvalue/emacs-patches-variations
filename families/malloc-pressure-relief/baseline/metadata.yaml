  rate_limit: "minimum 3 seconds between consecutive compactions"
  zone_scope: "NULL (all malloc zones via malloc_zone_pressure_relief API)"
  thresholds: "static constants (MEMORY_COMPACT_FREED_THRESHOLD, MEMORY_COMPACT_EVERY_N_GCS, MEMORY_COMPACT_MIN_INTERVAL_SECS)"
