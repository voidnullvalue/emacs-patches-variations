  - src/alloc.c
design_dimensions:
  timing: "asynchronous — dispatched to GCD serial background queue after GC"
  queue_qos: "QOS_CLASS_BACKGROUND (lowest OS priority)"
  trigger_policy: "freed_bytes >= 1MB (lower threshold vs baseline's 4MB)"
  rate_limit: "minimum 5 seconds between dispatches"
  overlap_prevention: "atomic in-flight flag"
  thread_safety: "malloc_zone_pressure_relief is thread-safe per Apple docs"
  gc_pause_impact: "zero — compaction runs on background thread"
  platform: "macOS only (#ifdef HAVE_MALLOC_MALLOC_H)"
dependencies:
  - "libdispatch (GCD) — standard on macOS"
  - "C11 stdatomic.h"
conflicts:
  - malloc-pressure-relief-baseline
