expected_tradeoffs:
  benefits:
    - "Zero GC pause — compaction does not block the main thread"
    - "Lower freed threshold (1MB) because dispatching is cheap"
    - "Background priority prevents competition with Emacs's own threads"
    - "Atomic flag prevents multiple concurrent compactions"
  costs:
    - "Compaction effect is delayed (runs after GC, not during)"
    - "Concurrent allocation from main thread may interfere with compaction"
    - "Adds dependency on libdispatch (already present on macOS)"
    - "More complex control flow than baseline"
    - "stat block captures no Emacs state (cannot safely call Lisp functions)"
